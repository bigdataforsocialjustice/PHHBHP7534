# Proof in Research

---

# What Constitutes "Proof"?

"Proof" in research means reducing measurement error, or random noise, to limit or minimize the uncertainty surrounding our statistial inferences

--
Example: Our OLS estimates are called 'BLUE' because they are the *B*est *L*inear *U*nbiased *E*stimates of the relationship betwen `\(X\)` and `\(Y\)`

--

Classic approach: if A does not cause B, how likely would we have been to observe the results we did? This is also known as the **counterfactual**

--

This is analogous to our coin flip

- The `\(H_0\)`: The coin is fair 
  - Question: how does this equate to the standard null of *no difference*?

- If we flip a coin `\(n\)` times and get 7 heads, how likely would it be to get 7 or more heads with a fair coin?

- *Note*: this question has SUBSTANTIAL AND SIGNIFICANT social justice and policy implications

---
# Example

How can we assess whether jury selection is a random process (i.e., the null hypothesis) in this case?

# Confounding
Once an association is found, you must ask whether it is real
- is it due to chance?
- could it be due to bias?

---

# Course Schedule

---

# Errors
Two major types of errors
- non-differential or random
- differential or systematic

--

random error: use of invalid outcome measure that equally misclassifies cases and controls

Systematic error: use of an invalid measure that misclassifies cases in one direction and controls in another
---

# Random error v bias

Chance is caused by random error
- if the random error is due to the sample size, increase the sample
- affects precision of estimates, chance leads to imprecision

--

Bias is caused by systematic error 
Can not be fixed
Bias leads to inaccurate results

---

# Types of Bias

Selection bias 
- Unrepresentative nature of samples or/and the method of participant selection distorts the exposure-outcome relationship from reality

-- 

Information (misclassification) bias
- Collecting information differently between two groups leads to an error

--

Confounding 
- Some other factors(variables) distort  the exposure-outcome relation.

---

# Selection Bias

Selection Bias occurs when the selection of participants in one group results in a different outcome than the selection for the other group
Participants are not equally balanced or objectively represented

---
# Selection Bias Examples

- Berkson's bias
- Prevalence/Incidence bias
- Loss to follow up bias
- Healthy worker effect
- Volunteer bias
- Sampling bias
  - refusal, non-response, agreement to participate

---

# Controlling selection bias
Define criteria of selection of diseased and non-diseased participants independent of exposures in a case control study
Define criteria of selection of exposed and non-exposed participants independent of disease outcomes in a cohort study (i.e, external comparison group or loss to follow-up)
Apply randomization, blind or mask in clinical trials
---
# Information bias
Information bias occurs when information is collected differently between two groups, leading to an error in the conclusion of the association
When information is incorrect, there is misclassification
Non-Differential misclassification: If misclassification of exposure (or disease) is unrelated to disease (or exposure) then the misclassification is non-differential. The misclassification does not differ between the two groups
If misclassification of exposure (or disease) is related to disease (or exposure) then the misclassification is differential.  The misclassification differs between the two groups
---
# Information bias examples
- Interviewer bias
- Questionnaire bias
- Instrument bias
- Recall bias
- Case-definition bias
- Data source bias
---

# Controlling infomation bias
Have a standardized protocol for data collection
Make sure sources and methods of data collection are similar for all study groups
Make sure interviewers and study personnel are unaware of exposure/disease status
Adapt a strategy to assess potential information bias

---

# Bias types &amp; confounding
Systematic errors that cannot be fixed
- Selection bias
- Information (misclassification) bias

Confounding
- may lead to conclusion errors but if known can be addressed

---

# Confounding

Confounding occurs when the observed results between exposure and disease differs from the truth because of the influence of the third variable.
Effect of a factor of interest is mingled with (confounded with) another factor
The distortion can be large and lead to overestimation or underestimation of an effect.

---

# Confounding
Confounding occurs when the relationship between a given exposure and a specific disease/outcome is distorted (confused) by the influence of a third variable or group of variables (confounders)
By controlling for confounding, we can obtain an unbiased estimate of the causal relationship between exposure and outcome
Two ways to deal with confounding
- the study design phase (by randomization, restriction and matching) 
- during data analysis (by stratification and multivariate analysis)

---
# Stratification
A statistical technique that allows to control for confounding by creating two or more categories (strata) in which the confounding variable either does not vary or does not vary very much

Two types of adjustments for confounding by stratification: 
- pooling analysis by the Mantel-Haenszel formula; and 
- standardization
---
# Preliminary (Stratification)
- the simplest way to control confounding during data analysis
- preliminary step towards applying the Mantel-Haenszel formula and standardization

Running example: A relationship between Down syndrom and maternal age is found. Is birth order causally associated with Down syndrome independently of the confounding effect of the maternal age?
---

# Stratification for Confounding: The Mantel-Haenszel Formula

Does the frequency of Down syndrome increase according to maternal age for each category of birth order?

Yes. But in each age category the birth order did not affect the frequency of Down syndrome. Thus, the crude association between birth order and Down syndrome is the mere result of the confounding effect of maternal age.

[@tripepi_stratification_2010]
---

# Confounding
To be a confounding factor, two conditions must be met
- Be associated with exposure (but not a consequence of the exposure)
Be associated with outcome
  - independently of exposure
  
Also, a confounder cannot be an intermediary step in the causal pathway from the exposure of interest to the outcome of interest.

In the example, maternal age is correlated with birth order and a risk factor even if birth order is low. So maternal age is confounder.

---
# Control of Confounding in Study Design

It is possible to minimize confounding by utilizing certain strategies in the design of a study
Restriction
Matching
Randomization (in intervention studies only)
There are also analytical techniques that provide a way of adjusting for confounding in the analysis, provided one has information on the status of the confounding factors in the study subjects. These techniques are:
Stratification
Multiple variable regression analysis (Model Fitting)
---
# Control of Confounding in the Analysis - Stratified
Step 1: Find a crude association

---

# Notes

First, if you compare the cumulative incidence in young versus old active subjects, you can see that older subjects had a higher risk of CVD than younger subjects; this was true for both obese and non-obese subjects. Therefore, age and CVD (the outcome of interest) are associated (Chi Sq). (Criteria 1)
In addition, obesity was more common in older subjects, meaning that age and obesity were also associated(Chi-sq)(Criteria 2)
Finally, there is no reason to think that age is an intermediary variable in the causal chain between obesity and CVD. Therefore, these observations satisfy all three of the requirements for a confounder.

---
The risk ratios for the age-stratified analysis are similar, but less then the crude risk ratio (RR=1.79)
This indicates that  there was confounding by age in the overall sample
We saw that obese subjects were more likely to be 50 and older
Also saw that those over  age 50 had a greater risk of CVD
As a result; the crude analysis overestimated the true association
between obesity and CVD, because of the greater proportion 
of older subjects among the obese group 

---
# Summary
Comparing the crude and stratum-specific measures of association is a very practical way to determine whether confounding is present and how bad it is. 
You calculate an overall crude (unadjusted) relative risk (or odds ratio) and compare it to the stratum-specific relative risks (or odds ratios). 
If the stratum-specific measures of association are similar to the crude measure of association, then there is no confounding by that factor, and you can just use the crude measure of association. 
However, if the stratified estimates of association differ from the unadjusted estimate by 10% or more, then there is evidence of confounding.
---
# Note
Stratified analysis works best when there are few strata (only 1 or 2 confounders have to be controlled)
If the number of potential confounders is large, multivariate analysis are applied
Can handle large number of confounders  (covariates) simultaneously 
Based statistical regression models
---
# Examples

Researchers investigated the attitudes of patients about the use of placebo treatments in medical care. A telephone survey was used. Participants were residents in Northern California, aged 18-75 years, who had been seen by a primary care provider for a chronic health problem at least once in the previous six months.

Participants were randomly selected using age stratified sampling (10 year age groups) from all residents in Northern California who met the inclusion criteria. An introductory letter describing the study’s aims was sent to 1800 residents inviting them to participate, with the opportunity to opt out of the study. Those who did not opt out were telephoned and asked to complete the survey by phone. Sample members were excluded if they had dementia or could not participate in a telephone interview because of communication barriers (hearing, language). Of the 1800 residents sampled, 1598 were reachable by mail and potentially eligible to participate. Of these, 853 completed the telephone interview, giving a response rate of 53.4% (853/1598).

The researchers concluded that most patients in the survey seemed favourable to the idea of placebo treatments, and that they valued honesty and transparency in this context. Respondents suggested that doctors should consider engaging with patients to discuss their values and attitudes about the appropriateness of using treatments aimed at promoting placebo responses.
Which of the following types of bias, if any, would the above questionnaire survey have been prone to?
a)	Attrition bias
b)	Non-response bias
c)	Response bias
d)	Selection bias
e)	Volunteer bias

# xaringan

Provides an R Markdown output format `xaringan::moon_reader` as a wrapper for remark.js, and you can use it in the YAML metadata, e.g.

# Some Tips

- Do not forget to try the `yolo` option of `xaringan::moon_reader`.

    ```yaml
    output:
      xaringan::moon_reader:
        yolo: true
    ```

---

# Some Tips

- Slides can be automatically played if you set the `autoplay` option under `nature`, e.g. go to the next slide every 30 seconds in a lightning talk:

    ```yaml
    output:
      xaringan::moon_reader:
        nature:
          autoplay: 30000
    ```

- If you want to restart the play after it reaches the last slide, you may set the sub-option `loop` to TRUE, e.g.,

    ```yaml
    output:
      xaringan::moon_reader:
        nature:
          autoplay:
            interval: 30000
            loop: true
    ```

---

# Some Tips

- A countdown timer can be added to every page of the slides using the `countdown` option under `nature`, e.g. if you want to spend one minute on every page when you give the talk, you can set:

    ```yaml
    output:
      xaringan::moon_reader:
        nature:
          countdown: 60000
    ```

    Then you will see a timer counting down from `01:00`, to `00:59`, `00:58`, ... When the time is out, the timer will continue but the time turns red.
    
---

# Some Tips

- The title slide is created automatically by **xaringan**, but it is just another remark.js slide added before your other slides.

    The title slide is set to `class: center, middle, inverse, title-slide` by default. You can change the classes applied to the title slide with the `titleSlideClass` option of `nature` (`title-slide` is always applied).

    ```yaml
    output:
      xaringan::moon_reader:
        nature:
          titleSlideClass: [top, left, inverse]
    ```
    
--

- If you'd like to create your own title slide, disable **xaringan**'s title slide with the `seal = FALSE` option of `moon_reader`.

    ```yaml
    output:
      xaringan::moon_reader:
        seal: false
    ```

An example of using the trailing comment `#&lt;&lt;` to highlight lines:

````markdown
```{r tidy=FALSE}
library(ggplot2)
ggplot(mtcars) + 
  aes(mpg, disp) + 
  geom_point() +   #&lt;&lt;
  geom_smooth()    #&lt;&lt;
```
````

Output:


```r
library(ggplot2)
ggplot(mtcars) + 
  aes(mpg, disp) + 
* geom_point() +
* geom_smooth()
```

When you enable line-highlighting, you can also use the chunk option `highlight.output` to highlight specific lines of the text output from a code chunk. For example, `highlight.output = TRUE` means highlighting all lines, and `highlight.output = c(1, 3)` means highlighting the first and third line.

````md
```{r, highlight.output=c(1, 3)}
head(iris)

# Some Tips

- To make slides work offline, you need to download a copy of remark.js in advance, because **xaringan** uses the online version by default (see the help page `?xaringan::moon_reader`).

- You can use `xaringan::summon_remark()` to download the latest or a specified version of remark.js. By default, it is downloaded to `libs/remark-latest.min.js`.

- Then change the `chakra` option in YAML to point to this file, e.g.

    ```yaml
    output:
      xaringan::moon_reader:
        chakra: libs/remark-latest.min.js
    ```

- If you used Google fonts in slides (the default theme uses _Yanone Kaffeesatz_, _Droid Serif_, and _Source Code Pro_), they won't work offline unless you download or install them locally. The Heroku app [google-webfonts-helper](https://google-webfonts-helper.herokuapp.com/fonts) can help you download fonts and generate the necessary CSS.

---

# Macros

- remark.js [allows users to define custom macros](https://github.com/yihui/xaringan/issues/80) (JS functions) that can be applied to Markdown text using the syntax `![:macroName arg1, arg2, ...]` or `![:macroName arg1, arg2, ...](this)`. For example, before remark.js initializes the slides, you can define a macro named `scale`:

    ```js
    remark.macros.scale = function (percentage) {
      var url = this;
      return '&lt;img src="' + url + '" style="width: ' + percentage + '" /&gt;';
    };
    ```

    Then the Markdown text

    ```markdown
    ![:scale 50%](image.jpg)
    ```

    will be translated to
    
    ```html
    &lt;img src="image.jpg" style="width: 50%" /&gt;
    ```

---

# Macros (continued)

- To insert macros in **xaringan** slides, you can use the option `beforeInit` under the option `nature`, e.g.,

    ```yaml
    output:
      xaringan::moon_reader:
        nature:
          beforeInit: "macros.js"
    ```

    You save your remark.js macros in the file `macros.js`.

- The `beforeInit` option can be used to insert arbitrary JS code before `remark.create()`. Inserting macros is just one of its possible applications.

---

# CSS

Among all options in `xaringan::moon_reader`, the most challenging but perhaps also the most rewarding one is `css`, because it allows you to customize the appearance of your slides using any CSS rules or hacks you know.

You can see the default CSS file [here](https://github.com/yihui/xaringan/blob/master/inst/rmarkdown/templates/xaringan/resources/default.css). You can completely replace it with your own CSS files, or define new rules to override the default. See the help page `?xaringan::moon_reader` for more information.

---

# CSS

For example, suppose you want to change the font for code from the default "Source Code Pro" to "Ubuntu Mono". You can create a CSS file named, say, `ubuntu-mono.css`:

```css
@import url(https://fonts.googleapis.com/css?family=Ubuntu+Mono:400,700,400italic);

.remark-code, .remark-inline-code { font-family: 'Ubuntu Mono'; }
```

Then set the `css` option in the YAML metadata:

```yaml
output:
  xaringan::moon_reader:
    css: ["default", "ubuntu-mono.css"]
```

Here I assume `ubuntu-mono.css` is under the same directory as your Rmd.

See [yihui/xaringan#83](https://github.com/yihui/xaringan/issues/83) for an example of using the [Fira Code](https://github.com/tonsky/FiraCode) font, which supports ligatures in program code.

---

# CSS (with Sass)

**xaringan** also supports Sass support via **rmarkdown**. Suppose you want to use the same color for different elements, e.g., first heading and bold text. You can create a `.scss` file, say `mytheme.scss`, using the [sass](https://sass-lang.com/) syntax with variables:

```scss
$mycolor: #ff0000; 
.remark-slide-content &gt; h1 { color: $mycolor; }
.remark-slide-content strong { color: $mycolor; }
```

Then set the `css` option in the YAML metadata using this file placed under the same directory as your Rmd:

```yaml
output:
  xaringan::moon_reader:
    css: ["default", "mytheme.scss"]
```

This requires **rmarkdown** &gt;= 2.8 and the [**sass**](https://rstudio.github.io/sass/) package. You can learn more about **rmarkdown** and **sass** support in [this blog post](https://blog.rstudio.com/2021/04/15/2021-spring-rmd-news/#sass-and-scss-support-for-html-based-output) and in [**sass** overview vignette](https://rstudio.github.io/sass/articles/sass.html).

# Themes

To use a theme, you can specify the `css` option as an array of CSS filenames (without the `.css` extensions), e.g.,

```yaml
output:
  xaringan::moon_reader:
    css: [default, metropolis, metropolis-fonts]
```

If you want to contribute a theme to **xaringan**, please read [this blog post](https://yihui.org/en/2017/10/xaringan-themes).

# Sharingan

The R package name **xaringan** was derived&lt;sup&gt;1&lt;/sup&gt; from **Sharingan**, a dōjutsu in the Japanese anime _Naruto_ with two abilities:

- the "Eye of Insight"

- the "Eye of Hypnotism"

I think a presentation is basically a way to communicate insights to the audience, and a great presentation may even "hypnotize" the audience.&lt;sup&gt;2,3&lt;/sup&gt;

.footnote[
[1] In Chinese, the pronounciation of _X_ is _Sh_ /ʃ/ (as in _shrimp_). Now you should have a better idea of how to pronounce my last name _Xie_.

[2] By comparison, bad presentations only put the audience to sleep.

[3] Personally I find that setting background images for slides is a killer feature of remark.js. It is an effective way to bring visual impact into your presentations.
]

# Naruto terminology

The **xaringan** package borrowed a few terms from Naruto, such as

- [Sharingan](https://naruto.fandom.com/wiki/Sharingan) (写輪眼; the package name)

- The [moon reader](https://naruto.fandom.com/wiki/Moon_Reader) (月読; an attractive R Markdown output format)

- [Chakra](https://naruto.fandom.com/wiki/Chakra) (查克拉; the path to the remark.js library, which is the power to drive the presentation)

- [Nature transformation](https://naruto.fandom.com/wiki/Nature_Transformation) (性質変化; transform the chakra by setting different options)

- The [infinite moon reader](https://naruto.fandom.com/wiki/Infinite_Tsukuyomi) (無限月読; start a local web server to continuously serve your slides)

- The [summoning technique](https://naruto.fandom.com/wiki/Summoning_Technique) (download remark.js from the web)

You can click the links to know more about them if you want. The jutsu "Moon Reader" may seem a little evil, but that does not mean your slides are evil.
